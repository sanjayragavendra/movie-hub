<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Celestial Cinema | Premium Movie Reviews</title>
  <!-- Google Fonts: Inter & Space Grotesk for premium typography -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
      color: #f0f3fa;
      scroll-behavior: smooth;
    }

    /* custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 10px;
    }

    /* glassmorphism navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(10, 15, 30, 0.65);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      padding: 1rem 2rem;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', monospace;
      font-weight: 600;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e9d5ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .logo span {
      font-size: 1.9rem;
    }

    /* search bar - glass style */
    .search-wrapper {
      background: rgba(30, 35, 55, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 0.4rem 1rem;
      display: flex;
      align-items: center;
      transition: all 0.2s ease;
    }
    .search-wrapper:focus-within {
      border-color: #c084fc;
      box-shadow: 0 0 12px rgba(139,92,246,0.4);
    }
    .search-icon {
      color: #a78bfa;
      margin-right: 8px;
    }
    #searchInput {
      background: transparent;
      border: none;
      padding: 0.6rem 0;
      font-size: 1rem;
      color: white;
      width: 220px;
      outline: none;
      font-weight: 400;
    }
    #searchInput::placeholder {
      color: #b9c3e6;
      font-weight: 300;
    }

    /* main container */
    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* movie grid */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    /* glassmorphic card */
    .movie-card {
      background: rgba(20, 25, 45, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(139, 92, 246, 0.25);
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      transform: translateY(0);
    }

    .movie-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(168, 85, 247, 0.7);
      box-shadow: 0 25px 40px rgba(139, 92, 246, 0.25);
    }

    .poster-wrapper {
      position: relative;
      overflow: hidden;
      height: 380px;
    }
    .movie-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }
    .card-content {
      padding: 1.5rem;
    }
    .movie-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, #ffffff, #e0d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .movie-desc {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #ccd6f6;
      opacity: 0.85;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* detail modal / overlay */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(3, 5, 11, 0.85);
      backdrop-filter: blur(18px);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      visibility: hidden;
      opacity: 0;
      transition: visibility 0.2s, opacity 0.25s ease;
    }
    .modal-overlay.active {
      visibility: visible;
      opacity: 1;
    }
    .modal-container {
      max-width: 850px;
      width: 90%;
      background: rgba(18, 22, 40, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 40px;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 2rem;
      position: relative;
      animation: fadeSlideUp 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
    }
    @keyframes fadeSlideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .close-modal {
      position: absolute;
      top: 1.2rem;
      right: 1.5rem;
      font-size: 2rem;
      cursor: pointer;
      background: rgba(255,255,255,0.1);
      width: 40px;
      height: 40px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }
    .close-modal:hover {
      background: #8b5cf6;
      transform: scale(1.05);
    }
    .modal-detail {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
    }
    .modal-poster {
      flex: 1.2;
      min-width: 180px;
    }
    .modal-poster img {
      width: 100%;
      border-radius: 28px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(139,92,246,0.4);
    }
    .modal-info {
      flex: 2;
    }
    .modal-title {
      font-size: 2.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f3e8ff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
    }
    .modal-description {
      font-size: 1.1rem;
      line-height: 1.5;
      margin: 1rem 0 2rem;
      color: #e2e8ff;
    }
    .gdrive-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(95deg, #7c3aed, #a855f7);
      border: none;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.05rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(124,58,237,0.4);
    }
    .gdrive-btn:hover {
      transform: scale(1.02);
      background: linear-gradient(95deg, #8b5cf6, #c084fc);
      box-shadow: 0 10px 24px rgba(139,92,246,0.6);
    }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 4rem;
      background: rgba(255,255,255,0.02);
      border-radius: 48px;
      backdrop-filter: blur(5px);
      font-size: 1.2rem;
      color: #b9c8ff;
    }

    /* loader animation */
    .loader {
      text-align: center;
      padding: 3rem;
      font-size: 1.4rem;
      color: #a78bfa;
    }

    /* footer */
    .footer {
      margin-top: 4rem;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(139,92,246,0.2);
      font-size: 0.85rem;
      color: #8592c0;
    }

    @media (max-width: 700px) {
      .nav-container {
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrapper {
        width: 100%;
      }
      #searchInput {
        width: 100%;
      }
      .container {
        padding: 0 1rem;
      }
      .modal-container {
        padding: 1.5rem;
      }
      .modal-title {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <div class="logo">
      <span>🎬</span> CELESTIAL CINEMA
    </div>
    <div class="search-wrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search movies... (title)">
    </div>
  </div>
</nav>

<main class="container">
  <div id="moviesGridContainer" class="movies-grid">
    <!-- dynamic grid will be injected -->
    <div class="loader">✨ loading cinematic experience ...</div>
  </div>
</main>

<footer class="footer">
  <p>© Celestial Cinema — premium reviews & curated watchlist. All data from imp.txt</p>
</footer>

<!-- Modal for detailed view -->
<div id="movieModal" class="modal-overlay">
  <div class="modal-container">
    <div class="close-modal" id="closeModalBtn">✕</div>
    <div id="modalContent" class="modal-detail">
      <!-- dynamic modal content -->
    </div>
  </div>
</div>

<script>
  // ---------- GLOBAL STATE ----------
  let allMovies = [];        // array of movie objects
  let filteredMovies = [];   // after search filtering

  // DOM elements
  const gridContainer = document.getElementById('moviesGridContainer');
  const searchInput = document.getElementById('searchInput');
  const modalOverlay = document.getElementById('movieModal');
  const modalContentDiv = document.getElementById('modalContent');
  const closeModalBtn = document.getElementById('closeModalBtn');

  // Helper: parse imp.txt line by line respecting quotes and commas
  // Format: "Movie Name" , "Short Description" , "Google Drive Link" , "Poster Image URL"
  // We'll use a robust regex to extract quoted fields (handles spaces, commas inside quotes)
  function parseMovieLine(line) {
    // Remove any leading/trailing whitespace
    line = line.trim();
    if (line === "") return null;
    
    // Regex to match quoted strings: "([^"]*)"
    const regex = /"([^"]*)"/g;
    const matches = [...line.matchAll(regex)];
    if (matches.length >= 4) {
      const title = matches[0][1].trim();
      const description = matches[1][1].trim();
      const gdriveLink = matches[2][1].trim();
      const posterUrl = matches[3][1].trim();
      return { title, description, gdriveLink, posterUrl };
    } else {
      // fallback: split by comma but handle basic quotes (legacy)
      console.warn("Line not fully matched with regex, attempting fallback:", line);
      const parts = line.match(/"(.*?)"/g).map(p => p.replace(/"/g, '').trim());
      if(parts.length >= 4) {
        return { title: parts[0], description: parts[1], gdriveLink: parts[2], posterUrl: parts[3] };
      }
      return null;
    }
  }

  // fetch imp.txt and parse movies
  async function loadMoviesFromFile() {
    try {
      const response = await fetch('imp.txt');
      if (!response.ok) {
        throw new Error(`Could not load imp.txt: ${response.status}`);
      }
      const text = await response.text();
      const lines = text.split(/\r?\n/);
      const movies = [];
      for (let line of lines) {
        if (line.trim().length === 0) continue;
        const movie = parseMovieLine(line);
        if (movie) {
          // optional: ensure poster URL is absolute or relative, but we keep as is
          movies.push(movie);
        }
      }
      if (movies.length === 0) {
        console.warn("No movies parsed, check imp.txt format.");
        gridContainer.innerHTML = `<div class="empty-state">⚠️ No movies found in imp.txt. Please check the format: "Name","Desc","DriveLink","PosterURL" each line.</div>`;
      }
      return movies;
    } catch (error) {
      console.error("Error loading imp.txt:", error);
      gridContainer.innerHTML = `<div class="empty-state">❌ Failed to load imp.txt. Make sure file exists in same directory. <br> Error: ${error.message}</div>`;
      return [];
    }
  }

  // render movie cards based on filteredMovies array
  function renderCards(moviesArray) {
    if (!moviesArray.length) {
      gridContainer.innerHTML = `<div class="empty-state">🎞️ No movies match your search. Try another title.</div>`;
      return;
    }
    const cardsHTML = moviesArray.map((movie, idx) => {
      // fallback poster if broken / empty
      const posterImg = movie.posterUrl && movie.posterUrl.trim() !== "" ? movie.posterUrl : "https://via.placeholder.com/300x450?text=No+Poster";
      return `
        <div class="movie-card" data-movie-index="${idx}">
          <div class="poster-wrapper">
            <img class="movie-poster" src="${escapeHtml(posterImg)}" alt="${escapeHtml(movie.title)} poster" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x450?text=Poster+Missing'">
          </div>
          <div class="card-content">
            <h3 class="movie-title">${escapeHtml(movie.title)}</h3>
            <p class="movie-desc">${escapeHtml(movie.description)}</p>
          </div>
        </div>
      `;
    }).join('');
    gridContainer.innerHTML = cardsHTML;
    
    // attach click event listeners to each card (using data-movie-index based on original filteredMovies)
    const cards = document.querySelectorAll('.movie-card');
    cards.forEach((card, idx) => {
      card.addEventListener('click', (e) => {
        e.stopPropagation();
        const movieObj = moviesArray[idx];
        if (movieObj) openMovieDetail(movieObj);
      });
    });
  }

  // open detailed modal view
  function openMovieDetail(movie) {
    const safePoster = movie.posterUrl && movie.posterUrl.trim() !== "" ? movie.posterUrl : "https://via.placeholder.com/300x450?text=No+Poster";
    modalContentDiv.innerHTML = `
      <div class="modal-poster">
        <img src="${escapeHtml(safePoster)}" alt="${escapeHtml(movie.title)} poster" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x450?text=Poster+Missing'">
      </div>
      <div class="modal-info">
        <h2 class="modal-title">${escapeHtml(movie.title)}</h2>
        <p class="modal-description">${escapeHtml(movie.description)}</p>
        <a href="${escapeHtml(movie.gdriveLink)}" target="_blank" rel="noopener noreferrer" class="gdrive-btn">
          🎞️ Watch / Download on Google Drive
        </a>
      </div>
    `;
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  // filter movies based on search input (case-insensitive, title match)
  function applySearchFilter() {
    const query = searchInput.value.trim().toLowerCase();
    if (!query) {
      filteredMovies = [...allMovies];
    } else {
      filteredMovies = allMovies.filter(movie => movie.title.toLowerCase().includes(query));
    }
    renderCards(filteredMovies);
  }

  // simple escape to avoid XSS
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // ---------- INITIALIZE APP ----------
  async function init() {
    // load movies from text file
    const movies = await loadMoviesFromFile();
    if (movies.length === 0) {
      // provide a fallback example set if file missing? But spec says strictly load from imp.txt.
      // We'll just show error, but optionally we can embed 8-12 entries in imp.txt (as required).
      // The error is clear. For better UX, we show an empty state.
      allMovies = [];
      filteredMovies = [];
      renderCards([]);
    } else {
      allMovies = movies;
      filteredMovies = [...allMovies];
      renderCards(filteredMovies);
    }
    
    // attach search listener
    searchInput.addEventListener('input', applySearchFilter);
    
    // modal close events
    closeModalBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => {
      if (e.target === modalOverlay) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
        closeModal();
      }
    });
  }

  init();
</script>
</body>
</html>
