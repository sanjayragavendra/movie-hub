<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Celestial Cinema | Premium Movie Reviews</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
      color: #f0f3fa;
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #8b5cf6;
      border-radius: 10px;
    }

    /* Navbar */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(10, 15, 30, 0.65);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      padding: 1rem 2rem;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Space Grotesk', monospace;
      font-weight: 600;
      font-size: 1.7rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e9d5ff, #a78bfa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-decoration: none;
      cursor: pointer;
    }
    .logo span {
      font-size: 1.9rem;
    }

    .search-wrapper {
      background: rgba(30, 35, 55, 0.6);
      backdrop-filter: blur(8px);
      border-radius: 60px;
      border: 1px solid rgba(139, 92, 246, 0.5);
      padding: 0.4rem 1rem;
      display: flex;
      align-items: center;
      transition: all 0.2s ease;
    }
    .search-wrapper:focus-within {
      border-color: #c084fc;
      box-shadow: 0 0 12px rgba(139,92,246,0.4);
    }
    .search-icon {
      color: #a78bfa;
      margin-right: 8px;
    }
    #searchInput {
      background: transparent;
      border: none;
      padding: 0.6rem 0;
      font-size: 1rem;
      color: white;
      width: 220px;
      outline: none;
      font-weight: 400;
    }
    #searchInput::placeholder {
      color: #b9c3e6;
      font-weight: 300;
    }

    .container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    /* Homepage Grid */
    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      margin-top: 2rem;
    }

    .movie-card {
      background: rgba(20, 25, 45, 0.45);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      border: 1px solid rgba(139, 92, 246, 0.25);
      overflow: hidden;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      transform: translateY(0);
    }

    .movie-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: rgba(168, 85, 247, 0.7);
      box-shadow: 0 25px 40px rgba(139, 92, 246, 0.25);
    }

    .poster-wrapper {
      position: relative;
      overflow: hidden;
      height: 380px;
    }
    .movie-poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .movie-card:hover .movie-poster {
      transform: scale(1.05);
    }
    .card-content {
      padding: 1.5rem;
    }
    .movie-title {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      background: linear-gradient(to right, #ffffff, #e0d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }
    .movie-desc {
      font-size: 0.9rem;
      line-height: 1.45;
      color: #ccd6f6;
      opacity: 0.85;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* DETAIL PAGE STYLES - Full Page Movie View */
    .detail-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .back-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(139, 92, 246, 0.2);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(139, 92, 246, 0.4);
      padding: 0.7rem 1.5rem;
      border-radius: 60px;
      color: #c4b5fd;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 2rem;
      text-decoration: none;
    }

    .back-button:hover {
      background: rgba(139, 92, 246, 0.4);
      transform: translateX(-5px);
    }

    .movie-detail-card {
      background: rgba(18, 22, 40, 0.7);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      border: 1px solid rgba(139, 92, 246, 0.4);
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0,0,0,0.5);
    }

    .detail-content {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem;
      padding: 3rem;
    }

    .detail-poster-section {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .detail-poster {
      width: 100%;
    }

    .detail-poster img {
      width: 100%;
      border-radius: 32px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.4);
      border: 2px solid rgba(139, 92, 246, 0.3);
    }

    .watch-btn-below-poster {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .gdrive-btn-poster {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(95deg, #7c3aed, #a855f7);
      border: none;
      padding: 1rem 1.5rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(124,58,237,0.4);
      width: 100%;
    }

    .gdrive-btn-poster:hover {
      transform: scale(1.02);
      background: linear-gradient(95deg, #8b5cf6, #c084fc);
      box-shadow: 0 12px 28px rgba(139,92,246,0.6);
    }

    .detail-info {
      flex: 2;
    }

    .detail-title {
      font-size: 3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #f3e8ff, #c4b5fd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1.5rem;
      line-height: 1.2;
    }

    .detail-description {
      font-size: 1.2rem;
      line-height: 1.7;
      color: #e2e8ff;
      margin: 1.5rem 0;
    }

    /* Optional button in info section (hidden, kept for reference) */
    .gdrive-btn-large {
      display: none;
    }

    .empty-state {
      text-align: center;
      padding: 4rem;
      background: rgba(255,255,255,0.02);
      border-radius: 48px;
      backdrop-filter: blur(5px);
      font-size: 1.2rem;
      color: #b9c8ff;
    }

    .loader {
      text-align: center;
      padding: 3rem;
      font-size: 1.4rem;
      color: #a78bfa;
    }

    .footer {
      margin-top: 4rem;
      text-align: center;
      padding: 2rem;
      border-top: 1px solid rgba(139,92,246,0.2);
      font-size: 0.85rem;
      color: #8592c0;
    }

    @media (max-width: 768px) {
      .nav-container {
        flex-direction: column;
        align-items: stretch;
      }
      .search-wrapper {
        width: 100%;
      }
      #searchInput {
        width: 100%;
      }
      .container {
        padding: 0 1rem;
      }
      .detail-content {
        padding: 1.5rem;
        flex-direction: column;
      }
      .detail-title {
        font-size: 2rem;
      }
      .detail-poster-section {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo" id="homeLink">
      <span>🎬</span> CELESTIAL CINEMA
    </a>
    <div class="search-wrapper" id="searchWrapper">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search movies... (title)">
    </div>
  </div>
</nav>

<main id="mainContent">
  <div class="container">
    <div class="loader">✨ loading cinematic experience ...</div>
  </div>
</main>

<footer class="footer">
  <p>© Celestial Cinema — premium reviews & curated watchlist. All data from imp.txt</p>
</footer>

<script>
  // ---------- GLOBAL STATE ----------
  let allMovies = [];
  let currentPage = 'home';
  let currentMovieId = null;

  const mainContent = document.getElementById('mainContent');
  const searchInput = document.getElementById('searchInput');
  const searchWrapper = document.getElementById('searchWrapper');

  function parseMovieLine(line) {
    line = line.trim();
    if (line === "") return null;
    
    const regex = /"([^"]*)"/g;
    const matches = [...line.matchAll(regex)];
    if (matches.length >= 4) {
      const title = matches[0][1].trim();
      const description = matches[1][1].trim();
      const gdriveLink = matches[2][1].trim();
      const posterUrl = matches[3][1].trim();
      return { title, description, gdriveLink, posterUrl };
    } else {
      const parts = line.match(/"(.*?)"/g).map(p => p.replace(/"/g, '').trim());
      if(parts.length >= 4) {
        return { title: parts[0], description: parts[1], gdriveLink: parts[2], posterUrl: parts[3] };
      }
      return null;
    }
  }

  async function loadMoviesFromFile() {
    try {
      const response = await fetch('imp.txt');
      if (!response.ok) {
        throw new Error(`Could not load imp.txt: ${response.status}`);
      }
      const text = await response.text();
      const lines = text.split(/\r?\n/);
      const movies = [];
      for (let line of lines) {
        if (line.trim().length === 0) continue;
        const movie = parseMovieLine(line);
        if (movie) {
          movies.push(movie);
        }
      }
      return movies;
    } catch (error) {
      console.error("Error loading imp.txt:", error);
      return [];
    }
  }

  function renderHomePage(moviesArray) {
    if (!moviesArray.length) {
      mainContent.innerHTML = `
        <div class="container">
          <div class="empty-state">🎞️ No movies found. Make sure imp.txt exists and has valid data.</div>
        </div>
      `;
      return;
    }

    const cardsHTML = moviesArray.map((movie, idx) => `
      <div class="movie-card" data-movie-idx="${idx}">
        <div class="poster-wrapper">
          <img class="movie-poster" src="${escapeHtml(movie.posterUrl)}" alt="${escapeHtml(movie.title)} poster" loading="lazy" onerror="this.onerror=null;this.src='https://via.placeholder.com/300x450?text=Poster+Missing'">
        </div>
        <div class="card-content">
          <h3 class="movie-title">${escapeHtml(movie.title)}</h3>
          <p class="movie-desc">${escapeHtml(movie.description)}</p>
        </div>
      </div>
    `).join('');

    mainContent.innerHTML = `
      <div class="container">
        <div class="movies-grid" id="moviesGrid">
          ${cardsHTML}
        </div>
      </div>
    `;

    const cards = document.querySelectorAll('.movie-card');
    cards.forEach((card, idx) => {
      card.addEventListener('click', () => {
        const movie = moviesArray[idx];
        navigateToDetail(movie, idx);
      });
    });

    if (searchWrapper) searchWrapper.style.display = 'flex';
  }

  function navigateToDetail(movie, movieId) {
    currentMovieId = movieId;
    currentPage = 'detail';
    
    if (searchWrapper) searchWrapper.style.display = 'none';
    
    const safePoster = movie.posterUrl && movie.posterUrl.trim() !== "" ? movie.posterUrl : "https://via.placeholder.com/500x750?text=Poster+Missing";
    
    mainContent.innerHTML = `
      <div class="detail-container">
        <button class="back-button" id="backToHomeBtn">
          ← Back to All Movies
        </button>
        <div class="movie-detail-card">
          <div class="detail-content">
            <div class="detail-poster-section">
              <div class="detail-poster">
                <img src="${escapeHtml(safePoster)}" alt="${escapeHtml(movie.title)} poster" onerror="this.onerror=null;this.src='https://via.placeholder.com/500x750?text=Poster+Missing'">
              </div>
              <div class="watch-btn-below-poster">
                <a href="${escapeHtml(movie.gdriveLink)}" target="_blank" rel="noopener noreferrer" class="gdrive-btn-poster">
                  🎬 Watch / Download on Google Drive
                </a>
              </div>
            </div>
            <div class="detail-info">
              <h1 class="detail-title">${escapeHtml(movie.title)}</h1>
              <p class="detail-description">${escapeHtml(movie.description)}</p>
            </div>
          </div>
        </div>
      </div>
    `;
    
    const backBtn = document.getElementById('backToHomeBtn');
    if (backBtn) {
      backBtn.addEventListener('click', () => {
        navigateToHome();
      });
    }
    
    window.history.pushState({ page: 'detail', movieId: movieId }, '', `?movie=${encodeURIComponent(movie.title)}`);
  }

  function navigateToHome() {
    currentPage = 'home';
    currentMovieId = null;
    
    if (searchWrapper) searchWrapper.style.display = 'flex';
    if (searchInput) searchInput.value = '';
    
    renderHomePage(allMovies);
    window.history.pushState({ page: 'home' }, '', window.location.pathname);
  }

  function applySearchFilter() {
    if (currentPage !== 'home') return;
    
    const query = searchInput.value.trim().toLowerCase();
    let filtered;
    if (!query) {
      filtered = [...allMovies];
    } else {
      filtered = allMovies.filter(movie => movie.title.toLowerCase().includes(query));
    }
    renderHomePage(filtered);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function handlePopState(event) {
    if (event.state && event.state.page === 'detail') {
      if (currentMovieId !== null && allMovies[currentMovieId]) {
        navigateToDetail(allMovies[currentMovieId], currentMovieId);
      } else {
        navigateToHome();
      }
    } else {
      navigateToHome();
    }
  }

  function checkUrlForMovie() {
    const urlParams = new URLSearchParams(window.location.search);
    const movieTitle = urlParams.get('movie');
    if (movieTitle && allMovies.length > 0) {
      const movieIndex = allMovies.findIndex(m => m.title.toLowerCase() === movieTitle.toLowerCase());
      if (movieIndex !== -1) {
        navigateToDetail(allMovies[movieIndex], movieIndex);
        return true;
      }
    }
    return false;
  }

  async function init() {
    const movies = await loadMoviesFromFile();
    if (movies.length === 0) {
      allMovies = [];
      mainContent.innerHTML = `
        <div class="container">
          <div class="empty-state">❌ Failed to load imp.txt. Make sure file exists in same directory with format: "Name","Desc","DriveLink","PosterURL"</div>
        </div>
      `;
      return;
    }
    
    allMovies = movies;
    
    const hasMovieParam = checkUrlForMovie();
    if (!hasMovieParam) {
      renderHomePage(allMovies);
    }
    
    if (searchInput) {
      searchInput.addEventListener('input', applySearchFilter);
    }
    
    window.addEventListener('popstate', handlePopState);
    
    const homeLink = document.getElementById('homeLink');
    if (homeLink) {
      homeLink.addEventListener('click', (e) => {
        e.preventDefault();
        navigateToHome();
      });
    }
  }

  init();
</script>
</body>
</html>
